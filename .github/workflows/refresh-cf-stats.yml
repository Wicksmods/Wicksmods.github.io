name: Refresh CF download stats

# Pulls per-file totalDownloads from CurseForge for every Wick suite addon,
# sums them, and commits the total to data/downloads.json. The landing page
# fetches that JSON to render the big number in the hero stat band.
#
# Also HEAD-checks each addon's public CurseForge slug to write
# data/addons-status.json — the landing page uses that to flip the "New"
# badge to "Pending approval" while a freshly-uploaded addon waits for CF
# review (during which the public slug 404s).
#
# Cron: every 6 hours. Manual trigger via the Actions tab when needed.

on:
  schedule:
    - cron: '17 */6 * * *'   # 17 past every 6th hour — off the hour to avoid GH-wide thundering herd
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch totals from CurseForge
        run: |
          set -euo pipefail
          mkdir -p data
          TOTAL=0
          # Project IDs from wick.json
          # 1502804 BIS, 1519243 CD, 1502890 Trade, 1521208 Macro, 1525232 Combat,
          # 1532082 Stats, 1533199 Quest Key
          for ID in 1502804 1519243 1502890 1521208 1525232 1532082 1533199; do
            # /api/v1/mods/{id}/files returns up to pageSize results.
            # 500 is plenty — no Wick addon has anywhere near that many file uploads.
            BODY=$(curl -sf \
              -A "Wicksmods landing-page stat refresher (https://github.com/Wicksmods/Wicksmods.github.io)" \
              "https://www.curseforge.com/api/v1/mods/$ID/files?pageIndex=0&pageSize=500" \
              || echo '{"data":[]}')
            P=$(echo "$BODY" | jq '[.data[].totalDownloads] | add // 0')
            echo "  Project $ID : $P"
            TOTAL=$((TOTAL + P))
          done
          echo "TOTAL: $TOTAL"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n --arg updated "$NOW" --argjson total "$TOTAL" \
            '{updated: $updated, total: $total}' > data/downloads.json
          echo "Wrote:"
          cat data/downloads.json

          # Patch the seed in index.html so first paint shows a fresh number
          # (the JS fetch still wins, but reduces the visible flash on refresh).
          # Matches: <div ... id="total-downloads" data-default="NNN">NNN</div>
          sed -i -E "s|(id=\"total-downloads\" data-default=\")[0-9]+(\">)[0-9]+(</div>)|\1${TOTAL}\2${TOTAL}\3|" index.html
          echo "Seed line after patch:"
          grep 'id="total-downloads"' index.html || true

      - name: Check public-slug approval status
        run: |
          set -euo pipefail
          mkdir -p data

          # Slug list mirrors wick.json — keep in sync when adding a new addon.
          # cf_slug values: see https://github.com/Wicksmods/WickSuite/blob/main/wick.json
          SLUGS=(
            wicks-tbc-bis-tracker
            wicks-cd-tracker
            trade-hall
            wicks-macro-builder
            wicks-combat-log
            wicks-stats
            wicks-quest-key
          )

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          # Build a JSON object: { "slug": "live"|"pending", ... }
          # Pending = HEAD returns non-2xx (typically 404 during CF review).
          STATUS_JSON='{}'
          for SLUG in "${SLUGS[@]}"; do
            CODE=$(curl -sI -o /dev/null -w '%{http_code}' \
              -A "Wicksmods landing-page status checker (https://github.com/Wicksmods/Wicksmods.github.io)" \
              --max-time 15 \
              "https://www.curseforge.com/wow/addons/$SLUG" || echo 000)
            if [ "$CODE" = "200" ]; then
              STATE=live
            else
              STATE=pending
            fi
            echo "  $SLUG : HTTP $CODE → $STATE"
            STATUS_JSON=$(jq --arg s "$SLUG" --arg v "$STATE" '. + {($s): $v}' <<< "$STATUS_JSON")
          done
          jq --arg updated "$NOW" '. as $s | {updated: $updated, status: $s}' <<< "$STATUS_JSON" > data/addons-status.json
          echo "Wrote:"
          cat data/addons-status.json

      - name: Commit if changed
        run: |
          git config user.name "Wick"
          git config user.email "Jason@s-56.com"
          git add data/downloads.json data/addons-status.json index.html
          if git diff --staged --quiet; then
            echo "No change — nothing to commit."
          else
            git commit -m "Refresh CF download stats + approval status"
            git push
          fi
